[pytest]
# Pytest configuration for ShopBack backend testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 8.0

# Add source directory to Python path
pythonpath = .

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, requires services)
    slow: Slow tests (>1s execution time)
    websocket: WebSocket tests
    database: Tests requiring database
    api: API endpoint tests
    auth: Authentication tests
    news: News module tests
    health: Health module tests
    fortune: Fortune module tests
    xau: XAU data tests
    eth: ETH data tests
    macro: MacroPulse tests (hermetic unless marked llm)
    llm: Tests that call a live LLM API (skipped unless MACRO_RUN_LLM_EVAL=1)

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Output configuration
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals
    --tb=short
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-config=.coveragerc
    -p no:warnings

# Coverage configuration
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */.venv/*
    */site-packages/*
    */__pycache__/*
    */conftest.py
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
